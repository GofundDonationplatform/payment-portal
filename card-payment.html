<!DOCTYPE html>
<html>
<head>
  <title>Pay with Card</title>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
</head>

<body style="font-family: Arial; text-align: center; padding-top: 100px;">

  <h2>Pay with Card</h2>
  <p>Complete your payment securely using your card.</p>

  <input type="number" id="amount" placeholder="Enter Amount (USD)" />
  <br><br>

  <button id="payBtn">Pay Now</button>

  <script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
  document.getElementById("payBtn").addEventListener("click", function () {

    let amount = document.getElementById("amount").value;

    if (!amount) {
      alert("Enter amount");
      return;
    }

    FlutterwaveCheckout({
      public_key: "FLWPUBK_TEST-7f71d97e7d37bbb880ab0122a956a2c1-X",
      tx_ref: "tx-" + Date.now(),
      amount: amount,
      currency: "USD",
      payment_options: "card",
      customer: {
        email: "test@gmail.com",
        name: "Test User"
      },
      callback: function (response) {
        alert("Payment successful!");
        console.log(response);
      },
      onclose: function () {
        console.log("Payment closed");
      },
      customizations: {
        title: "GFSSGA Secure Payment",
        description: "Service Payment"
      }
    });

  });
</script>

  <hr>
  <p>© 2026 GFSSGA Impact Network | Secure Payment Portal</p>

</body>
</html>
