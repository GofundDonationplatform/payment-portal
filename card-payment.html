<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay with Card - GFSSGA Secure Payment Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      background: #001f4d; /* navy blue */
      color: white;
      padding: 40px 20px;
    }

    .header img.logo {
      width: 120px;
      margin-bottom: 15px;
    }

    .header h1 {
      margin: 10px 0 5px;
      font-size: 24px;
    }

    .header p.subtitle {
      margin: 0;
      font-size: 14px;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 420px;
      margin: 20px auto 40px auto;
      padding: 30px 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input[type="number"] {
      width: 90%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      display: block;
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #0066ff;
      color: white;
    }

    footer {
      font-size: 12px;
      color: #555;
      margin: 20px 0;
    }

    @media screen and (max-width: 480px) {
      .header h1 {
        font-size: 20px;
      }
      .header p.subtitle {
        font-size: 12px;
      }
      .container {
        padding: 20px 15px;
      }
      input[type="number"] {
        font-size: 14px;
        padding: 10px;
      }
      button {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="logo.png" alt="GFSSGA IMPACT NETWORK Logo" class="logo">
    <h1>GFSSGA-IMPACT-NETWORK</h1>
    <p class="subtitle">Secure Service Payment Portal</p>
  </div>

  <div class="container">
    <h2>Pay with Card</h2>
    <p>Complete your payment securely using your card.</p>
    <input type="number" id="amount" placeholder="Enter Amount (USD)">
    <button onclick="payWithCard()">Pay Now</button>
  </div>

  <footer>
    © 2026 GFSSGA Impact Network | Secure Payment Portal
  </footer>

  <!-- Flutterwave inline script -->
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <script>
    const publicKey = "FLWPUBK_TEST-7f71d97e7d37bbb880ab0122a956a2c1-X"; // replace with your key

    function payWithCard() {
      const amount = document.getElementById("amount").value;
      if (!amount || amount <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      FlutterwaveCheckout({
        public_key: publicKey,
        tx_ref: "GFSSGA-" + Date.now(),
        amount: amount,
        currency: "USD",
        payment_options: "card",
        customer: {
          email: "customer@example.com", // optional, replace dynamically if needed
        },
        customizations: {
          title: "GFSSGA Secure Payment Portal",
          description: "Payment for services",
          logo: "logo.png",
        },
        callback: function (data) {
          alert("Payment complete! Reference: " + data.tx_ref);
          window.location.href = "index.html"; // redirect after payment
        },
        onclose: function() {
          console.log("Payment popup closed");
        },
      });
    }
  </script>

</body>
</html>
