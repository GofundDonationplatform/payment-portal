<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Payment Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 30px;
      color: #e2e8f0;
    }

    .buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .card-btn {
      background: #22c55e;
    }

    .card-btn:hover {
      background: #16a34a;
    }

    .bank-btn {
      background: #3b82f6;
    }

    .bank-btn:hover {
      background: #2563eb;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      background: #020617;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>GFSSGA-IMPACT-NETWORK</h1>
    <h2>Secure Service Payment Portal</h2>

    <div class="buttons">
      <a href="card-payment.html" class="btn card-btn">
        Pay with Card
      </a>

      <a href="#" class="btn bank-btn">
        Pay via Bank Transfer
      </a>
    </div>
  </div>

  <footer>
    © 2026 GFSSGA Impact Network <br>
    Secure • Fast • Reliable Payments
  </footer>

</body>
</html>
